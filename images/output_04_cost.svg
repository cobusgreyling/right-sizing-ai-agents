      <stop offset="0%" style="stop-color:#2b2b2b"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  <rect width="820" height="580" rx="10" fill="url(#tbg4)"/>
  <rect width="820" height="36" rx="10" fill="#3a3a3a"/>
  <rect x="0" y="26" width="820" height="10" fill="#3a3a3a"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="410" y="22" text-anchor="middle" fill="#999" font-family="monospace" font-size="12">python3 examples/04_cost_comparison/cost_benchmark.py</text>

  <g font-family="'Menlo', 'Monaco', 'Courier New', monospace" font-size="12.5">
    <text x="20" y="60" fill="#6af">══════════════════════════════════════════════════════════════════</text>
    <text x="20" y="78" fill="#fff" font-weight="bold">  COST &amp; LATENCY BENCHMARK</text>
    <text x="20" y="96" fill="#aaa">  Monolith (Single Large Model) vs. Specialized Nemotron Stack</text>

    <!-- Results header -->
    <text x="20" y="130" fill="#fff" font-weight="bold">  BENCHMARK RESULTS</text>
    <text x="20" y="152" fill="#888">  Task                     Monolith       Specialized    Savings</text>
    <text x="20" y="166" fill="#555">  ─────────────────────────────────────────────────────────────────</text>

    <!-- Rows -->
    <text x="20" y="184" fill="#ccc">  Plan multi-step response  <tspan fill="#ff5f57">$0.00796</tspan>      <tspan fill="#28c840">$0.00796</tspan>      <tspan fill="#888">0.0%</tspan></text>
    <text x="20" y="202" fill="#ccc">  Check input safety        <tspan fill="#ff5f57">$0.00723</tspan>      <tspan fill="#28c840">$0.00026</tspan>      <tspan fill="#28c840">96.4%</tspan></text>
    <text x="20" y="220" fill="#ccc">  Embed query for retrieval <tspan fill="#ff5f57">$0.00000</tspan>      <tspan fill="#28c840">$0.00000</tspan>      <tspan fill="#888">0.0%</tspan></text>
    <text x="20" y="238" fill="#ccc">  Check output safety       <tspan fill="#ff5f57">$0.00741</tspan>      <tspan fill="#28c840">$0.00032</tspan>      <tspan fill="#28c840">95.7%</tspan></text>
    <text x="20" y="256" fill="#ccc">  Generate final answer     <tspan fill="#ff5f57">$0.00811</tspan>      <tspan fill="#28c840">$0.00811</tspan>      <tspan fill="#888">0.0%</tspan></text>
    <text x="20" y="270" fill="#555">  ─────────────────────────────────────────────────────────────────</text>
    <text x="20" y="288" fill="#fff" font-weight="bold">  TOTAL                     <tspan fill="#ff5f57">$0.03072</tspan>      <tspan fill="#28c840">$0.01665</tspan>      <tspan fill="#28c840">45.8%</tspan></text>

    <!-- Scale projections -->
    <text x="20" y="322" fill="#fff" font-weight="bold">  SCALE PROJECTIONS (per day)</text>
    <text x="20" y="344" fill="#888">  Daily Interactions   Monolith Cost    Specialized     Daily Savings</text>
    <text x="20" y="358" fill="#555">  ─────────────────────────────────────────────────────────────────</text>
    <text x="20" y="376" fill="#ccc">         1,000        <tspan fill="#ff5f57">$30.72</tspan>          <tspan fill="#28c840">$16.65</tspan>         <tspan fill="#febc2e">$14.07</tspan></text>
    <text x="20" y="394" fill="#ccc">        10,000        <tspan fill="#ff5f57">$307.18</tspan>         <tspan fill="#28c840">$166.53</tspan>        <tspan fill="#febc2e">$140.65</tspan></text>
    <text x="20" y="412" fill="#ccc">       100,000        <tspan fill="#ff5f57">$3,071.80</tspan>       <tspan fill="#28c840">$1,665.30</tspan>      <tspan fill="#febc2e">$1,406.50</tspan></text>
    <text x="20" y="430" fill="#ccc">     1,000,000        <tspan fill="#ff5f57">$30,718.00</tspan>      <tspan fill="#28c840">$16,653.00</tspan>     <tspan fill="#febc2e">$14,065.00</tspan></text>

    <!-- Key takeaways -->
    <text x="20" y="464" fill="#6af">══════════════════════════════════════════════════════════════════</text>
    <text x="20" y="482" fill="#fff" font-weight="bold">  KEY TAKEAWAYS</text>
    <text x="20" y="504" fill="#28c840">  Cost reduction:    45.8% per agent workflow</text>
    <text x="20" y="522" fill="#febc2e">  Annual savings at 100K/day: $513,372</text>
    <text x="20" y="544" fill="#ccc">  Each model is RIGHT-SIZED — no wasted compute.</text>
    <text x="20" y="566" fill="#888">  Reasoning: 12B | Safety: 8B | Embeddings: 1.7B</text>
